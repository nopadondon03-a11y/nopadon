<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waste Analysis Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 font-sans text-slate-800">

    <div class="max-w-7xl mx-auto p-6">
        <header class="mb-8">
            <h1 class="text-3xl font-bold text-slate-900">วิเคราะห์ข้อมูล Waste จากไฟล์ NCP</h1>
        </header>

        <!-- ตัวกรองข้อมูล (Filter) -->
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 mb-8 flex gap-4">
            <div>
                <label class="block text-sm font-medium text-slate-600 mb-1">เลือกเครื่องจักร (คอลัมน์ G)</label>
                <select id="machineFilter" class="border rounded-lg p-2 w-48" onchange="renderTable()">
                    <option value="ทั้งหมด">ทั้งหมด</option>
                    <option value="Machine A">Machine A</option>
                    <option value="Machine B">Machine B</option>
                </select>
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-slate-50">
                    <tr>
                        <th class="p-5 text-sm font-semibold text-slate-600">ประเภทแกรม (คอลัมน์ E)</th>
                        <th class="p-5 text-sm font-semibold text-slate-600">ปัญหาที่พบ (คอลัมน์ U)</th>
                        <th class="p-5 text-sm font-semibold text-slate-600">น้ำหนัก (คอลัมน์ Y)</th>
                    </tr>
                </thead>
                <tbody id="wasteTableBody" class="divide-y divide-slate-100"></tbody>
            </table>
        </div>
    </div>

    <script>
        // ข้อมูลตัวอย่างที่ปรับตามโครงสร้างที่คุณต้องการ
        const rawData = [
            { machine: 'Machine A', colE: 'CA105', problemColU: 'รอยยับ', weightColY: 50 },
            { machine: 'Machine B', colE: 'CA125', problemColU: 'ขาดกลาง', weightColY: 120 },
            { machine: 'Machine A', colE: 'CA105', problemColU: 'รอยเปื้อน', weightColY: 30 }
        ];

        function renderTable() {
            const machine = document.getElementById('machineFilter').value;
            const tbody = document.getElementById('wasteTableBody');
            tbody.innerHTML = '';

            const filtered = machine === 'ทั้งหมด' ? rawData : rawData.filter(d => d.machine === machine);

            filtered.forEach(item => {
                // แปลงประเภทแกรมตามเงื่อนไข (CA105 = แกรมบาง, CA125 = แกรมหนา)
                let gramType = item.colE;
                if (item.colE === 'CA105') gramType = 'แกรมบาง';
                else if (item.colE === 'CA125') gramType = 'แกรมหนา';

                tbody.innerHTML += `
                    <tr class="hover:bg-slate-50 transition">
                        <td class="p-5 font-medium">${gramType}</td>
                        <td class="p-5">${item.problemColU}</td>
                        <td class="p-5 font-bold">${item.weightColY} kg</td>
                    </tr>
                `;
            });
        }

        // เริ่มต้นแสดงผล
        renderTable();
    </script>
</body>
</html>
