<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waste Dashboard Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-50 min-h-screen p-4 md:p-8">
    <div class="max-w-7xl mx-auto">
        <header class="mb-8">
            <h1 class="text-3xl font-bold text-gray-900">Dashboard วิเคราะห์ Waste</h1>
            <div id="status" class="text-blue-600 mt-2">กำลังโหลดข้อมูล...</div>
        </header>

        <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200 mb-8 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-6 gap-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">จากวันที่</label>
                <input type="date" id="filterStartDate" class="mt-1 block w-full border border-gray-300 rounded-md p-2">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">ถึงวันที่</label>
                <input type="date" id="filterEndDate" class="mt-1 block w-full border border-gray-300 rounded-md p-2">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">เดือน</label>
                <select id="filterMonth" class="mt-1 block w-full border border-gray-300 rounded-md p-2"><option value="all">ทั้งหมด</option></select>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">เครื่องจักร</label>
                <select id="filterMachine" class="mt-1 block w-full border border-gray-300 rounded-md p-2"><option value="all">ทั้งหมด</option></select>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">ปัญหา</label>
                <select id="filterProblem" class="mt-1 block w-full border border-gray-300 rounded-md p-2"><option value="all">ทั้งหมด</option></select>
            </div>
            <div class="flex items-end">
                <button onclick="applyFilters()" class="w-full bg-blue-600 text-white py-2 rounded-md font-bold hover:bg-blue-700 transition">กรองข้อมูล</button>
            </div>
        </div>

        <!-- ส่วนกราฟ -->
        <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200 mb-8">
            <div class="flex flex-col md:flex-row md:items-center justify-between mb-6">
                <h2 class="font-bold text-gray-700 text-xl">แนวโน้มน้ำหนักของเสีย (kg)</h2>
                <div id="chartMode" class="bg-gray-100 p-1 rounded-full flex gap-1 mt-4 md:mt-0 shadow-inner">
                    <button onclick="setMode('Daily')" id="btnDaily" class="px-6 py-2 rounded-full font-medium transition">Daily</button>
                    <button onclick="setMode('Weekly')" id="btnWeekly" class="px-6 py-2 rounded-full font-medium transition bg-indigo-600 text-white shadow-md">Weekly</button>
                    <button onclick="setMode('Monthly')" id="btnMonthly" class="px-6 py-2 rounded-full font-medium transition">Monthly</button>
                </div>
            </div>
            <canvas id="wasteChart" height="80"></canvas>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-indigo-900 text-white p-6 rounded-xl shadow-lg">
                <h2 class="text-sm opacity-80">น้ำหนักรวมทั้งหมด</h2>
                <div id="totalAll" class="text-3xl font-bold">0.00 kg</div>
            </div>
            <div class="bg-blue-600 text-white p-6 rounded-xl shadow-lg">
                <h2 class="text-sm opacity-80">น้ำหนักรวม แกรมบาง (CM105)</h2>
                <div id="totalThin" class="text-3xl font-bold">0.00 kg</div>
            </div>
            <div class="bg-sky-600 text-white p-6 rounded-xl shadow-lg">
                <h2 class="text-sm opacity-80">น้ำหนักรวม แกรมหนา (CM125)</h2>
                <div id="totalThick" class="text-3xl font-bold">0.00 kg</div>
            </div>
        </div>
        
        <div id="dashboard" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </div>

    <script>
        const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTqoJ5yKma3mpIUZZbwmYX92PEJ1z6_ntn2BGqQXR310jkITIHNzg4Pgf12BklBo_5iS9QHnoy15jQU/pub?output=csv';
        let rawData = [];
        let myChart = null;
        let currentMode = 'Weekly';

        function setMode(mode) {
            currentMode = mode;
            document.querySelectorAll('#chartMode button').forEach(b => b.classList.remove('bg-indigo-600', 'text-white', 'shadow-md'));
            document.getElementById('btn' + mode).classList.add('bg-indigo-600', 'text-white', 'shadow-md');
            applyFilters();
        }

        function getTimeKey(dateStr, mode) {
            const d = new Date(dateStr);
            if(isNaN(d)) return "N/A";
            if(mode === 'Daily') return dateStr;
            if(mode === 'Monthly') return `${d.getFullYear()}-${(d.getMonth()+1).toString().padStart(2,'0')}`;
            // Weekly
            d.setHours(0,0,0,0); d.setDate(d.getDate() + 4 - (d.getDay()||7));
            const yearStart = new Date(d.getFullYear(),0,1);
            return `${d.getFullYear()}-W${Math.ceil((((d - yearStart) / 86400000) + 1)/7)}`;
        }

        function parseDate(dateStr) {
            if (!dateStr) return null;
            if (dateStr.match(/^\d{1,2}\/\d{1,2}\/\d{4}$/)) {
                const parts = dateStr.split('/');
                return `${parts[2]}-${parts[1].padStart(2, '0')}-${parts[0].padStart(2, '0')}`;
            }
            return dateStr;
        }

        async function init() {
            const res = await fetch(sheetUrl);
            const csv = await res.text();
            Papa.parse(csv, { header: false, skipEmptyLines: true, complete: (results) => {
                rawData = results.data.slice(1);
                populateSelectFilters();
                applyFilters();
            }});
        }

        function populateSelectFilters() {
            const months = new Set(), machines = new Set(), problems = new Set();
            rawData.forEach(r => {
                if(r[29]) months.add(r[29]);
                if(r[6]) machines.add(r[6]);
                if(r[20]) problems.add(r[20]);
            });
            const fillSelect = (id, items) => {
                const el = document.getElementById(id);
                Array.from(items).sort().forEach(v => { if(v) el.innerHTML += `<option value="${v}">${v}</option>`; });
            };
            fillSelect('filterMonth', months);
            fillSelect('filterMachine', machines);
            fillSelect('filterProblem', problems);
            document.getElementById('status').classList.add('hidden');
        }

        function applyFilters() {
            const startDate = document.getElementById('filterStartDate').value;
            const endDate = document.getElementById('filterEndDate').value;
            const monthVal = document.getElementById('filterMonth').value;
            const machVal = document.getElementById('filterMachine').value;
            const probVal = document.getElementById('filterProblem').value;

            const groups = { "แกรมบาง (CM105)": {}, "แกรมหนา (CM125)": {}, "ไม่ได้ระบุประเภท": {} };
            let totals = { "แกรมบาง (CM105)": 0, "แกรมหนา (CM125)": 0, "ไม่ได้ระบุประเภท": 0, "all": 0 };
            const chartData = {};

            rawData.forEach(row => {
                const rowDate = parseDate(row[27]);
                const matchDate = (!startDate || (rowDate && rowDate >= startDate)) && (!endDate || (rowDate && rowDate <= endDate));
                const matchMonth = (monthVal === 'all' || row[29] === monthVal);
                const matchMach = (machVal === 'all' || row[6] === machVal);
                const matchProb = (probVal === 'all' || row[20] === probVal);

                if (matchDate && matchMonth && matchMach && matchProb) {
                    const weight = parseFloat(row[24]) || 0;
                    const problem = row[20] || "ไม่มีระบุปัญหา";
                    let type = "ไม่ได้ระบุประเภท";
                    for(let i=33; i<=37; i++) {
                        const val = (row[i] || "").toUpperCase();
                        if(val.includes("CM105")) type = "แกรมบาง (CM105)";
                        else if(val.includes("CM125")) type = "แกรมหนา (CM125)";
                    }
                    groups[type][problem] = (groups[type][problem] || 0) + weight;
                    totals[type] += weight; totals.all += weight;

                    const key = getTimeKey(rowDate, currentMode);
                    if(!chartData[key]) chartData[key] = { "แกรมบาง (CM105)": 0, "แกรมหนา (CM125)": 0 };
                    if(type !== "ไม่ได้ระบุประเภท") chartData[key][type] += weight;
                }
            });

            document.getElementById('totalAll').innerText = totals.all.toLocaleString(undefined, {minimumFractionDigits: 2}) + " kg";
            document.getElementById('totalThin').innerText = totals["แกรมบาง (CM105)"].toLocaleString(undefined, {minimumFractionDigits: 2}) + " kg";
            document.getElementById('totalThick').innerText = totals["แกรมหนา (CM125)"].toLocaleString(undefined, {minimumFractionDigits: 2}) + " kg";
            
            render(groups);
            renderChart(chartData);
        }

        function renderChart(data) {
            const labels = Object.keys(data).sort();
            const ctx = document.getElementById('wasteChart').getContext('2d');
            if(myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        { label: 'แกรมบาง (CM105)', data: labels.map(l => data[l]["แกรมบาง (CM105)"]), borderColor: '#2563eb', tension: 0.3 },
                        { label: 'แกรมหนา (CM125)', data: labels.map(l => data[l]["แกรมหนา (CM125)"]), borderColor: '#0ea5e9', tension: 0.3 }
                    ]
                },
                options: { responsive: true, plugins: { legend: { position: 'bottom' } } }
            });
        }

        function render(groups) {
            const container = document.getElementById('dashboard');
            container.innerHTML = '';
            for (const [name, problems] of Object.entries(groups)) {
                const probEntries = Object.entries(problems);
                if(probEntries.length === 0) continue;
                container.innerHTML += `
                    <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                        <h2 class="font-bold border-b pb-2 mb-4 text-gray-700">${name}</h2>
                        ${probEntries.map(([p, w]) => `
                            <div class="flex justify-between py-1 text-sm text-gray-600">
                                <span>${p}</span>
                                <span class="font-bold text-gray-900">${w.toFixed(2)} kg</span>
                            </div>
                        `).join('')}
                    </div>`;
            }
        }
        init();
    </script>
</body>
</html>
