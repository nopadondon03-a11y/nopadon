<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Waste & Consumption Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-50 p-5">
    <div class="max-w-4xl mx-auto space-y-6">
        <h1 class="text-2xl font-bold text-gray-800">Waste & Consumption Dashboard</h1>
        
        <div class="bg-white p-6 rounded-2xl shadow border flex flex-wrap gap-4 items-center">
            <div>
                <label class="block text-xs font-bold text-gray-500 mb-1">จากวันที่</label>
                <input type="date" id="date-start" class="border p-2 rounded" onchange="updateDashboard()">
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-500 mb-1">ถึงวันที่</label>
                <input type="date" id="date-end" class="border p-2 rounded" onchange="updateDashboard()">
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-500 mb-1">กลุ่ม (คอลัมน์ A)</label>
                <select id="group-filter" class="border p-2 rounded w-40" onchange="updateDashboard()">
                    <option value="all">ทั้งหมด</option>
                </select>
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-500 mb-1">คอลัมน์ C</label>
                <select id="col-c-filter" class="border p-2 rounded w-40" onchange="updateDashboard()">
                    <option value="all">ทั้งหมด</option>
                </select>
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-500 mb-1">เครื่องจักร (Waste)</label>
                <select id="machine-filter" class="border p-2 rounded w-40" onchange="updateDashboard()">
                    <option value="all">ทั้งหมด</option>
                </select>
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-500 mb-1">เครื่องจักร (Cons)</label>
                <select id="cons-machine-filter" class="border p-2 rounded w-40" onchange="updateDashboard()">
                    <option value="all">ทั้งหมด</option>
                </select>
            </div>
            <button onclick="resetFilters()" class="mt-4 bg-gray-200 px-4 py-2 rounded text-sm hover:bg-gray-300">ล้างค่า</button>
        </div>
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-white p-6 rounded-2xl shadow border-l-8 border-pink-500">
                <p class="text-xs text-gray-500 uppercase font-bold">Total Waste Weight (กก.)</p>
                <p id="total-weight" class="font-bold text-3xl text-gray-800">0.00</p>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow border-l-8 border-blue-500">
                <p class="text-xs text-gray-500 uppercase font-bold">Total Consumption (กก.)</p>
                <p id="total-con" class="font-bold text-3xl text-gray-800">0.00</p>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow border-l-8 border-yellow-500">
                <p class="text-xs text-gray-500 uppercase font-bold">Waste %</p>
                <p id="waste-percent" class="font-bold text-3xl text-gray-800">0.00 %</p>
            </div>
        </div>

        <div class="bg-white p-6 rounded-xl shadow border">
            <h2 class="font-bold mb-4">กราฟแนวโน้ม Waste % รายวัน</h2>
            <canvas id="trendChart" height="100"></canvas>
        </div>

        <div class="bg-white p-6 rounded-xl shadow border">
            <h2 class="font-bold mb-4">รายละเอียด Waste</h2>
            <div class="max-h-96 overflow-y-auto">
                <table class="w-full text-sm">
                    <thead class="bg-gray-50 sticky top-0">
                        <tr><th class="py-2 text-left">ปัญหา</th><th class="py-2 text-right">น้ำหนักรวม (กก.)</th></tr>
                    </thead>
                    <tbody id="table-waste"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const sheetWasteUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSSujwDMZcl2kxH9Cph6tuv7L3mfOgCPvz9OJcTu1wcKtu6_RB9_gjpc8bxL_TTRXUo4RYz6m_oa732/pub?output=csv';
        let wasteData = [], trendChart;

        function parseCleanFloat(val) { return parseFloat(val?.toString().replace(/,/g, '')) || 0; }
        function formatDate(dStr) {
            if (!dStr) return "";
            const parts = dStr.trim().split(/[\/\-]/);
            if (parts.length === 3) {
                let [d, m, y] = parts;
                if (y.length === 2) y = "20" + y;
                return `${y}-${m.padStart(2, '0')}-${d.padStart(2, '0')}`;
            }
            return dStr.trim();
        }

        async function fetchAllData() {
            try {
                const wRes = await fetch(sheetWasteUrl).then(r=>r.text());
                const parseCSV = (row) => row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(x => x.replace(/^"|"$/g, '').trim());
                const wLines = wRes.split('\n').slice(1);
                wasteData = wLines.filter(r => r.trim()).map(row => {
                    const c = parseCSV(row);
                    return { group: c[0], colC: c[2], issue: c[2], machine: c[3], weight: parseCleanFloat(c[4]), date: formatDate(c[5]), cons: parseCleanFloat(c[6]), consType: c[7], consMachine: c[8], consDate: formatDate(c[5]) };
                });
                
                const getUnique = (key) => [...new Set(wasteData.map(r => r[key]).filter(Boolean))].sort();
                document.getElementById('group-filter').innerHTML += getUnique('group').map(g => `<option value="${g}">${g}</option>`).join('');
                document.getElementById('col-c-filter').innerHTML += getUnique('colC').map(v => `<option value="${v}">${v}</option>`).join('');
                document.getElementById('machine-filter').innerHTML += getUnique('machine').map(m => `<option value="${m}">${m}</option>`).join('');
                document.getElementById('cons-machine-filter').innerHTML += getUnique('consMachine').map(m => `<option value="${m}">${m}</option>`).join('');
                updateDashboard();
            } catch (e) { console.error("Error:", e); }
        }

        function updateDashboard() {
            const start = document.getElementById('date-start').value, end = document.getElementById('date-end').value;
            const gFilter = document.getElementById('group-filter').value, cFilter = document.getElementById('col-c-filter').value;
            const mFilter = document.getElementById('machine-filter').value, cMFilter = document.getElementById('cons-machine-filter').value;

            const fWaste = wasteData.filter(r => (!start || r.date >= start) && (!end || r.date <= end) && (gFilter === 'all' || r.group === gFilter) && (cFilter === 'all' || r.colC === cFilter) && (mFilter === 'all' || r.machine === mFilter));
            
            const dailyData = {};
            const issueTotals = {};
            fWaste.forEach(r => {
                issueTotals[r.issue] = (issueTotals[r.issue] || 0) + r.weight;
                if(!dailyData[r.date]) dailyData[r.date] = { w: 0, c: 0 };
                dailyData[r.date].w += r.weight;
            });
            wasteData.forEach(r => {
                if ((!start || r.consDate >= start) && (!end || r.consDate <= end) && (cMFilter === 'all' || r.consMachine === cMFilter) && (r.consType && r.consType.toLowerCase().includes('cons'))) {
                    if(!dailyData[r.consDate]) dailyData[r.consDate] = { w: 0, c: 0 };
                    dailyData[r.consDate].c += r.cons;
                }
            });

            const dates = Object.keys(dailyData).sort();
            const pctVals = dates.map(d => dailyData[d].c > 0 ? ((dailyData[d].w / dailyData[d].c) * 100).toFixed(2) : 0);
            const totW = Object.values(dailyData).reduce((a,b)=>a+b.w, 0), totC = Object.values(dailyData).reduce((a,b)=>a+b.c, 0);

            document.getElementById('total-weight').innerText = totW.toLocaleString(undefined, {minimumFractionDigits: 2});
            document.getElementById('total-con').innerText = totC.toLocaleString(undefined, {minimumFractionDigits: 2});
            document.getElementById('waste-percent').innerText = (totC > 0 ? (totW / totC * 100) : 0).toLocaleString(undefined, {minimumFractionDigits: 2}) + ' %';
            document.getElementById('table-waste').innerHTML = Object.entries(issueTotals).map(([i, w]) => `<tr><td class="py-2 border-b">${i}</td><td class="text-right py-2 border-b">${w.toLocaleString(undefined, {minimumFractionDigits: 2})}</td></tr>`).join('');
            
            const ctx = document.getElementById('trendChart').getContext('2d');
            if(trendChart) trendChart.destroy();
            trendChart = new Chart(ctx, { type: 'line', data: { labels: dates, datasets: [{ label: 'Waste %', data: pctVals, borderColor: '#eab308', backgroundColor: '#fef9c3', fill: true }] }, options: { responsive: true, tension: 0.3, scales: { y: { beginAtZero: true, title: { display: true, text: '%' } } } } });
        }
        function resetFilters() { location.reload(); }
        fetchAllData();
    </script>
</body>
</html>
