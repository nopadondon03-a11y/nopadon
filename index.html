<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waste Monitoring Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-5">

<div class="max-w-6xl mx-auto bg-white p-6 rounded-lg shadow-lg">
    <h1 class="text-2xl font-bold mb-4 text-gray-800">แดชบอร์ดรายงานของเสีย (Waste Dashboard)</h1>
    
    <!-- Controls -->
    <div class="flex gap-4 mb-6">
        <select id="machineFilter" class="border p-2 rounded w-full md:w-1/3">
            <option value="">-- เลือกเครื่องจักรทั้งหมด --</option>
            <!-- Options dynamically added -->
        </select>
    </div>

    <!-- Table -->
    <div class="overflow-x-auto">
        <table class="min-w-full bg-white border border-gray-200">
            <thead class="bg-gray-800 text-white">
                <tr>
                    <th class="py-2 px-4">เครื่องจักร</th>
                    <th class="py-2 px-4">ลักษณะแกรม</th>
                    <th class="py-2 px-4">ปัญหาที่พบ</th>
                    <th class="py-2 px-4">น้ำหนัก (Kg)</th>
                </tr>
            </thead>
            <tbody id="wasteTableBody" class="text-gray-700">
                <!-- Data injected here -->
            </tbody>
        </table>
    </div>
</div>

<script>
    // ตัวอย่างข้อมูลที่ดึงมาจาก Spreadsheet ตามคอลัมน์ E, G, U, Y
    const wasteData = [
        { machine: "ISOWA", desc: "841 x 1745 KT125/CA105/KT125 C", issue: "พอง BL", weight: 223.92 },
        { machine: "BHS", desc: "Paper / CA125 / Paper", issue: "ขาดริม", weight: 150.50 },
        // ใส่ข้อมูลจาก Sheet ของคุณที่นี่...
    ];

    function renderTable(filterMachine = "") {
        const tbody = document.getElementById('wasteTableBody');
        tbody.innerHTML = "";

        const filtered = filterMachine ? wasteData.filter(d => d.machine === filterMachine) : wasteData;

        filtered.forEach(row => {
            // เงื่อนไข: CA105 เป็นแกรมบาง, CA125 เป็นแกรมหนา
            const gramType = row.desc.includes("CA105") ? "แกรมบาง" : 
                             row.desc.includes("CA125") ? "แกรมหนา" : "อื่นๆ";
            
            tbody.innerHTML += `
                <tr class="border-b hover:bg-gray-50">
                    <td class="py-2 px-4">${row.machine}</td>
                    <td class="py-2 px-4 font-semibold ${gramType === 'แกรมบาง' ? 'text-blue-600' : 'text-red-600'}">${gramType}</td>
                    <td class="py-2 px-4">${row.issue}</td>
                    <td class="py-2 px-4">${row.weight.toFixed(2)}</td>
                </tr>
            `;
        });
    }

    // Initialize Select Options
    const machineSelect = document.getElementById('machineFilter');
    const machines = [...new Set(wasteData.map(d => d.machine))];
    machines.forEach(m => machineSelect.innerHTML += `<option value="${m}">${m}</option>`);

    machineSelect.addEventListener('change', (e) => renderTable(e.target.value));

    // Render All Initially
    renderTable();
</script>
</body>
</html>
