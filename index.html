<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Waste & Consumption Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <style>
        body { font-family: 'Sarabun', sans-serif; }
        .card { transition: transform 0.2s; }
        .card:hover { transform: translateY(-5px); }
    </style>
</head>
<body class="bg-indigo-50 p-6 md:p-10">
    <div class="max-w-6xl mx-auto space-y-10">
        <header class="flex flex-col md:flex-row md:items-center justify-between gap-4">
            <div>
                <h1 class="text-4xl font-extrabold text-indigo-950 tracking-tight">Waste & Consumption</h1>
                <p class="text-lg text-indigo-600">สรุปภาพรวมการผลิตและการสูญเสีย</p>
            </div>
            <button onclick="resetFilters()" class="bg-white border-2 border-indigo-200 hover:bg-indigo-50 px-6 py-3 rounded-xl text-base font-bold transition shadow-lg text-indigo-900">ล้างตัวกรอง</button>
        </header>
        
        <section class="bg-white p-8 rounded-3xl shadow-xl border border-indigo-100 flex flex-wrap gap-4 items-end">
            <div class="flex flex-wrap gap-4 flex-grow">
                <div class="w-full md:w-auto">
                    <label class="block text-xs uppercase tracking-widest font-bold text-indigo-400 mb-2">จากวันที่</label>
                    <input type="date" id="date-start" class="bg-indigo-50 border-none p-4 rounded-xl w-full text-lg focus:ring-2 focus:ring-indigo-500" onchange="updateDashboard()">
                </div>
                <div class="w-full md:w-auto">
                    <label class="block text-xs uppercase tracking-widest font-bold text-indigo-400 mb-2">ถึงวันที่</label>
                    <input type="date" id="date-end" class="bg-indigo-50 border-none p-4 rounded-xl w-full text-lg focus:ring-2 focus:ring-indigo-500" onchange="updateDashboard()">
                </div>
                <div class="w-full md:w-auto">
                    <label class="block text-xs uppercase tracking-widest font-bold text-indigo-400 mb-2">สีกราฟ</label>
                    <input type="color" id="chart-color" value="#4f46e5" class="w-full h-[56px] rounded-xl cursor-pointer" onchange="updateDashboard()">
                </div>
            </div>
            <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 w-full">
                <select id="group-filter" class="bg-rose-50 p-4 rounded-xl text-base font-bold text-rose-900" onchange="updateDashboard()"><option value="all">Department</option></select>
                <select id="col-c-filter" class="bg-amber-50 p-4 rounded-xl text-base font-bold text-amber-900" onchange="updateDashboard()"><option value="all">Description</option></select>
                <select id="machine-filter" class="bg-emerald-50 p-4 rounded-xl text-base font-bold text-emerald-900" onchange="updateDashboard()"><option value="all">เครื่องจักร (W)</option></select>
                <select id="cons-machine-filter" class="bg-cyan-50 p-4 rounded-xl text-base font-bold text-cyan-900" onchange="updateDashboard()"><option value="all">เครื่องจักร (C)</option></select>
            </div>
        </section>
        
        <section class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <div class="card bg-gradient-to-br from-rose-400 to-rose-600 p-10 rounded-3xl shadow-2xl">
                <p class="text-sm text-rose-100 uppercase font-bold tracking-widest mb-2">Total Waste</p>
                <p id="total-weight" class="font-extrabold text-5xl text-white">0.00</p>
                <p class="text-base text-rose-100 mt-2">กิโลกรัม</p>
            </div>
            <div class="card bg-gradient-to-br from-cyan-400 to-blue-600 p-10 rounded-3xl shadow-2xl">
                <p class="text-sm text-blue-100 uppercase font-bold tracking-widest mb-2">Total Cons</p>
                <p id="total-con" class="font-extrabold text-5xl text-white">0.00</p>
                <p class="text-base text-blue-100 mt-2">กิโลกรัม</p>
            </div>
            <div id="waste-card" class="card bg-gradient-to-br from-amber-400 to-orange-500 p-10 rounded-3xl shadow-2xl">
                <p id="waste-card-title" class="text-sm text-amber-100 uppercase font-bold tracking-widest mb-2">Waste %</p>
                <p id="waste-percent" class="font-extrabold text-5xl text-white">0.00%</p>
                <p id="waste-status" class="text-base text-amber-100 font-bold mt-2">เทียบกับเป้าหมาย</p>
                <p id="waste-diff" class="text-sm text-amber-50 mt-1 font-semibold"></p>
            </div>
        </section>

        <section class="bg-white p-10 rounded-3xl shadow-xl border border-indigo-100">
            <div class="flex flex-col md:flex-row justify-between items-center mb-10 gap-4">
                <h2 id="chart-title" class="font-bold text-2xl text-indigo-950">แนวโน้มเปอร์เซ็นของเสีย</h2>
                <div class="flex bg-indigo-50 p-2 rounded-2xl" id="time-toggle">
                    <button onclick="setTimeGroup('day')" id="btn-day" class="px-8 py-3 text-sm font-bold rounded-xl transition-all">Daily</button>
                    <button onclick="setTimeGroup('week')" id="btn-week" class="px-8 py-3 text-sm font-bold rounded-xl bg-indigo-600 text-white shadow-lg">Weekly</button>
                    <button onclick="setTimeGroup('month')" id="btn-month" class="px-8 py-3 text-sm font-bold rounded-xl transition-all">Monthly</button>
                </div>
            </div>
            <canvas id="trendChart" height="90"></canvas>
        </section>

        <section class="bg-white p-10 rounded-3xl shadow-xl border border-indigo-100">
            <h2 class="font-bold text-2xl text-indigo-950 mb-6">กราฟแท่งน้ำหนักของเสียแยกตาม Department (kg)</h2>
            <canvas id="deptBarChart" height="80"></canvas>
        </section>
    </div>

    <script>
        Chart.register(ChartDataLabels);
        const sheetWasteUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSSujwDMZcl2kxH9Cph6tuv7L3mfOgCPvz9OJcTu1wcKtu6_RB9_gjpc8bxL_TTRXUo4RYz6m_oa732/pub?output=csv';
        let wasteData = [], trendChart, deptBarChart, currentTimeGroup = 'week';

        const targets = {
            "BHS": { "เศษติดแกน-ผลิต": 0.15, "รอยต่อออร์เดอร์": 0.20, "Web": 0.15, "Def": 1.10, "NCP": 2.00, "สันนูนตรงสเปค": 0.15, "งานเหลือโอเอ็ม": 0.05, "ของเหลือ": 1.01, "Conveyor": 0.03, "Reject QC": 0.09 },
            "YUELI": { "เศษติดแกน-ผลิต": 0.15, "รอยต่อออร์เดอร์": 0.20, "Web": 0.15, "Def": 1.10, "NCP": 2.00, "สันนูนตรงสเปค": 0.15, "งานเหลือโอเอ็ม": 0.05, "ของเหลือ": 1.01, "Conveyor": 0.03, "Reject QC": 0.09 },
            "ISOWA": { "เศษติดแกน-ผลิต": 0.15, "รอยต่อออร์เดอร์": 0.16, "Web": 0.17, "Def": 1.10, "NCP": 2.40, "สันนูนตรงสเปค": 0.15, "งานเหลือโอเอ็ม": 0.05, "ของเหลือ": 0.66, "Conveyor": 0.00, "Reject QC": 0.09 }
        };

        function setTimeGroup(mode) {
            currentTimeGroup = mode;
            ['day', 'week', 'month'].forEach(m => {
                const btn = document.getElementById('btn-' + m);
                btn.className = (m === mode) ? "px-8 py-3 text-sm font-bold rounded-xl bg-indigo-600 text-white shadow-lg" : "px-8 py-3 text-sm font-bold rounded-xl text-indigo-500 hover:text-indigo-900";
            });
            updateDashboard();
        }

        function parseCleanFloat(val) { return parseFloat(val?.toString().replace(/,/g, '')) || 0; }
        function formatDate(dStr) {
            const parts = dStr.trim().split(/[\/\-]/);
            if (parts.length === 3) {
                let [d, m, y] = parts;
                if (y.length === 2) y = "20" + y;
                return `${y}-${m.padStart(2, '0')}-${d.padStart(2, '0')}`;
            }
            return dStr.trim();
        }

        function getWeekNumber(dateStr) {
            const date = new Date(dateStr);
            const sunday = new Date(date);
            sunday.setDate(date.getDate() - date.getDay());
            const year = sunday.getFullYear();
            const startOfYear = new Date(year, 0, 1);
            const pastDays = (sunday - startOfYear) / 86400000;
            const weekNo = Math.ceil((pastDays + startOfYear.getDay() + 1) / 7);
            return `${year}-W${weekNo.toString().padStart(2, '0')}`;
        }

        async function fetchAllData() {
            const wRes = await fetch(sheetWasteUrl).then(r=>r.text());
            const rows = wRes.split('\n').slice(1);
            wasteData = rows.filter(r => r.trim()).map(row => {
                const c = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(x => x.replace(/^"|"$/g, '').trim());
                return { group: c[0], colC: c[2], machine: c[3], weight: parseCleanFloat(c[4]), date: formatDate(c[5]), cons: parseCleanFloat(c[6]), consType: c[7], consMachine: c[8] };
            });
            const maps = { 'group-filter': 'group', 'col-c-filter': 'colC', 'machine-filter': 'machine', 'cons-machine-filter': 'consMachine' };
            Object.keys(maps).forEach(id => {
                const sel = document.getElementById(id);
                [...new Set(wasteData.map(r => r[maps[id]]))].filter(Boolean).sort().forEach(v => sel.innerHTML += `<option value="${v}">${v}</option>`);
            });
            updateDashboard();
        }

        function updateDashboard() {
            const start = document.getElementById('date-start').value, end = document.getElementById('date-end').value;
            const mFilter = document.getElementById('machine-filter').value, cMFilter = document.getElementById('cons-machine-filter').value;
            const cFilter = document.getElementById('col-c-filter').value, gFilter = document.getElementById('group-filter').value;
            const chartColor = document.getElementById('chart-color').value;
            
            document.getElementById('chart-title').innerText = cFilter === 'all' ? 'แนวโน้มเปอร์เซ็นของเสีย' : `แนวโน้มเปอร์เซ็นของเสีย: ${cFilter}`;
            document.getElementById('waste-card-title').innerText = cFilter === 'all' ? 'Waste %' : `Waste % (${cFilter})`;

            let totalW = 0, totalC = 0;
            const periods = {};
            const deptStats = {}; 

            wasteData.forEach(r => {
                if ((start && r.date < start) || (end && r.date > end)) return;
                const matchWaste = (mFilter === 'all' || r.machine === mFilter) && (cFilter === 'all' || r.colC === cFilter) && (gFilter === 'all' || r.group === gFilter);
                const matchCons = (cMFilter === 'all' || r.consMachine === cMFilter) && (r.consType && r.consType.includes('Cons'));

                if(matchWaste) { totalW += r.weight; }
                if(matchCons) { totalC += r.cons; }

                if (!deptStats[r.group]) deptStats[r.group] = 0;
                if(matchWaste) deptStats[r.group] += r.weight;

                let p = r.date;
                if (currentTimeGroup === 'week') p = getWeekNumber(r.date);
                if (currentTimeGroup === 'month') p = r.date.substring(0, 7);
                if (!periods[p]) periods[p] = { w: 0, c: 0 };
                if (matchWaste) periods[p].w += r.weight;
                if (matchCons) periods[p].c += r.cons;
            });

            const actualPerc = totalC > 0 ? (totalW / totalC * 100) : 0;
            const targetVal = (targets[mFilter] && targets[mFilter][cFilter]) ? targets[mFilter][cFilter] : null;
            
            const wasteCard = document.getElementById('waste-card');
            const diffEl = document.getElementById('waste-diff');
            
            if (targetVal !== null) {
                const diff = actualPerc - targetVal;
                wasteCard.className = (actualPerc <= targetVal) ? "card bg-gradient-to-br from-emerald-500 to-emerald-700 p-10 rounded-3xl shadow-2xl" : "card bg-gradient-to-br from-rose-500 to-rose-700 p-10 rounded-3xl shadow-2xl";
                document.getElementById('waste-status').innerText = (actualPerc <= targetVal) ? "ผ่านเกณฑ์เป้าหมาย" : "สูงเกินเป้าหมาย";
                diffEl.innerText = (actualPerc <= targetVal) ? `ต่ำกว่าเป้าหมาย ${Math.abs(diff).toFixed(2)}%` : `สูงกว่าเป้าหมาย ${diff.toFixed(2)}%`;
            } else {
                wasteCard.className = "card bg-gradient-to-br from-amber-400 to-orange-500 p-10 rounded-3xl shadow-2xl";
                document.getElementById('waste-status').innerText = "เทียบกับเป้าหมาย";
                diffEl.innerText = "";
            }

            document.getElementById('total-weight').innerText = totalW.toLocaleString(undefined, {minimumFractionDigits: 2});
            document.getElementById('total-con').innerText = totalC.toLocaleString(undefined, {minimumFractionDigits: 2});
            document.getElementById('waste-percent').innerText = actualPerc.toFixed(2) + '%';

            // Trend Chart Logic
            const sortedKeys = Object.keys(periods).sort();
            const actuals = sortedKeys.map(k => periods[k].c > 0 ? (periods[k].w / periods[k].c * 100).toFixed(2) : 0);
            const targetsData = targetVal ? sortedKeys.map(() => targetVal.toFixed(2)) : [];

            if(trendChart) trendChart.destroy();
            const ctx = document.getElementById('trendChart').getContext('2d');
            const gradient = ctx.createLinearGradient(0, 0, 0, 400);
            gradient.addColorStop(0, chartColor + 'CC');
            gradient.addColorStop(1, chartColor + '00');

            trendChart = new Chart(ctx, {
                type: 'line',
                data: { 
                    labels: sortedKeys, 
                    datasets: [
                        { label: 'Actual %', data: actuals, borderColor: chartColor, backgroundColor: gradient, tension: 0.4, fill: true, order: 1 }, 
                        { label: 'Target (' + (targetVal ? targetVal.toFixed(2) : 'N/A') + '%)', data: targetsData, borderColor: '#ef4444', borderDash: [5, 5], fill: false, pointRadius: 0, order: 2 }
                    ] 
                },
                options: { 
                    responsive: true, 
                    plugins: { 
                        datalabels: { display: (context) => context.dataset.label === 'Actual %', color: '#1e293b', anchor: 'end', align: 'top', formatter: (v) => v + '%', font: { weight: 'bold', size: 14 } } 
                    }, 
                    scales: { y: { beginAtZero: true } } 
                }
            });

            const deptLabels = Object.keys(deptStats).filter(d => d !== 'undefined');
            const deptWeights = deptLabels.map(dept => deptStats[dept].toFixed(2));
            
            if(deptBarChart) deptBarChart.destroy();
            deptBarChart = new Chart(document.getElementById('deptBarChart').getContext('2d'), {
                type: 'bar',
                data: { labels: deptLabels, datasets: [{ label: 'Waste (kg)', data: deptWeights, backgroundColor: '#8b5cf6' }] },
                options: { responsive: true, plugins: { datalabels: { color: '#334155', anchor: 'end', align: 'top', formatter: (v) => v } }, scales: { y: { beginAtZero: true } } }
            });
        }
        function resetFilters() { location.reload(); }
        fetchAllData();
    </script>
</body>
</html>
